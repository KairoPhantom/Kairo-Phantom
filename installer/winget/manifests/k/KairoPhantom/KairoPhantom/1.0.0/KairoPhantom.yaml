ShortDescription: AI that writes into your Word docs, runs 100% offline, remembers your style
Description: |-
  Kairo Phantom is a local AI writing assistant that writes directly into Word, Excel,
  and PowerPoint documents with correct styles. Runs 100% offline using Ollama + Qwen3-4B.
  No API keys. No data leaves your machine. Learns your writing style across sessions.
