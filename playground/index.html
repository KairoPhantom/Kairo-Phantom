<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairo Phantom Playground</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 40px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #a0a0a0; margin-bottom: 24px; line-height: 1.5; }
        textarea { width: 100%; height: 150px; background-color: #1e1e1e; color: #ffffff; border: 1px solid #333; border-radius: 8px; padding: 16px; font-size: 14px; margin-bottom: 16px; font-family: monospace; resize: vertical; }
        select { background-color: #1e1e1e; color: #ffffff; border: 1px solid #333; padding: 8px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; width: 100%; }
        button { background-color: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #ff5c77; }
        .output-box { margin-top: 24px; background-color: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 16px; min-height: 100px; }
        .agent-badge { display: inline-block; background-color: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kairo Phantom Playground</h1>
        <p>Test Kairo's agents and commands directly in the browser. (Note: Desktop ghost-injection requires the native app).</p>
        
        <select id="agent-select">
            <option value="content">Content All-Rounder Agent</option>
            <option value="medical">Medical Scribe Agent (Waza SDK)</option>
            <option value="legal">Legal Brief Agent (Waza SDK)</option>
            <option value="design">Design & Media Agent</option>
            <option value="explain">Explain Mode (// explain)</option>
            <option value="kami">Kami Export (// kami email)</option>
        </select>

        <textarea id="prompt-input" placeholder="Type your prompt here... e.g. 'Summarize this Q1 report' or '// explain What is quantum entanglement?'"></textarea>
        
        <button onclick="simulateInference()">Generate Response</button>

        <div class="output-box">
            <div class="agent-badge" id="active-agent">Ready</div>
            <div id="response-output">Awaiting input...</div>
        </div>
    </div>

    <script>
        function simulateInference() {
            const input = document.getElementById('prompt-input').value;
            const agent = document.getElementById('agent-select').options[document.getElementById('agent-select').selectedIndex].text;
            const output = document.getElementById('response-output');
            const badge = document.getElementById('active-agent');
            
            if (!input) {
                output.innerText = "Please enter a prompt.";
                return;
            }

            badge.innerText = "Routing to: " + agent;
            output.innerText = "Generating...";

            setTimeout(() => {
                let response = "";
                if (input.includes("// explain")) {
                    response = "**Context Analysis:**\nThe provided text discusses a complex topic. \n> *Here is an inline explanation of the key terms.*";
                } else if (input.includes("// kami email")) {
                    response = "Subject: Q1 Update\n\nHi Team,\n\nHere is the summary of our Q1 metrics...\n\nBest,\nKairo Phantom";
                } else {
                    response = "This is a simulated response from the " + agent + ". In the desktop app, this text would be ghost-typed directly into your active window.";
                }
                output.innerText = response;
            }, 1200);
        }
    </script>
</body>
</html>
