<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairo Phantom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: rgba(10, 10, 18, 0.82);
      --border: rgba(99, 102, 241, 0.25);
      --border-glow: rgba(99, 102, 241, 0.6);
      --indigo: #6366f1;
      --indigo-soft: rgba(99, 102, 241, 0.15);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --green: #22d3ee;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: var(--text);
      user-select: none;
      overflow: hidden;
      width: 380px;
      height: 520px;
    }

    /* Drag region — top of the widget */
    .drag-region {
      -webkit-app-region: drag;
      height: 44px;
    }

    /* ── Main Ghost Shell ── */
    .ghost-shell {
      width: 380px;
      height: 520px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.08),
        0 4px 24px rgba(0,0,0,0.6),
        0 0 64px rgba(99,102,241,0.12),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
    }

    /* Ambient glow effect */
    .ghost-shell::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), transparent);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      -webkit-app-region: drag;
    }

    .ghost-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(99,102,241,0.4);
    }

    .header-text {
      flex: 1;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .status-dot.thinking { background: var(--indigo); box-shadow: 0 0 8px var(--indigo); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .status-dot.idle { background: #334155; box-shadow: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Context Preview ── */
    .context-panel {
      margin: 12px 14px 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .context-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .context-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      max-height: 54px;
      overflow: hidden;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    /* ── AI Suggestion Box ── */
    .suggestion-panel {
      margin: 10px 14px 0;
      background: var(--indigo-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      flex: 1;
      min-height: 0;
      position: relative;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .suggestion-panel.active {
      border-color: var(--border-glow);
      box-shadow: 0 0 20px rgba(99,102,241,0.15), inset 0 0 20px rgba(99,102,241,0.05);
    }

    .suggestion-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--indigo);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .suggestion-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--indigo);
    }

    .suggestion-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      overflow-y: auto;
      max-height: 120px;
      font-weight: 400;
    }

    /* Ghost typing cursor effect */
    .ghost-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--indigo);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .empty-state {
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
      padding: 16px 0;
      text-align: center;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      margin: 10px 14px 0;
      display: flex;
      gap: 8px;
    }

    .stat-chip {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 7px 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Action Button ── */
    .action-row {
      padding: 12px 14px 14px;
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .btn-materialize {
      flex: 1;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 2px 12px rgba(99,102,241,0.35);
    }

    .btn-materialize:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99,102,241,0.5);
    }

    .btn-materialize:active {
      transform: translateY(0);
    }

    .btn-materialize:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      -webkit-app-region: no-drag;
    }

    .btn-icon:hover { background: rgba(255,255,255,0.2); }

    /* ── Model Badge ── */
    .model-badge {
      margin: 0 14px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .model-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── Loading shimmer ── */
    @keyframes shimmer {
      0% { background-position: -380px 0; }
      100% { background-position: 380px 0; }
    }

    .loading-shimmer {
      background: linear-gradient(90deg,
        rgba(99,102,241,0.05) 25%,
        rgba(99,102,241,0.15) 50%,
        rgba(99,102,241,0.05) 75%
      );
      background-size: 380px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 13px;
      margin: 5px 0;
    }

    /* Toast Banner */
    .toast-banner {
      position: absolute;
      top: -60px;
      left: 14px;
      right: 14px;
      background: rgba(239, 68, 68, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 15px rgba(239, 68, 68, 0.3);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast-banner.show {
      top: 14px;
    }
    .toast-close {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.8;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .toast-close:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="ghost-shell">

    <!-- Beautiful Toast Banner -->
    <div id="toast-banner" class="toast-banner">
      <span style="font-size: 14px;">⚠️</span>
      <span id="toast-message">Domain is unavailable.</span>
      <span class="toast-close" onclick="hideToast()">✕</span>
    </div>

    <!-- Header with drag region -->
    <div class="header">
      <div class="ghost-icon">👻</div>
      <div class="header-text">
        <div class="header-title">Kairo Phantom</div>
        <div class="header-sub" id="status-text">Ready · Ctrl+Space to materialize</div>
      </div>
      <div class="status-dot" id="status-dot"></div>
    </div>

    <!-- Context preview — what the Ghost is "reading" -->
    <div class="context-panel">
      <div class="context-label">Current Context</div>
      <div class="context-text" id="context-text">
        Watching your active window...
      </div>
    </div>

    <!-- AI Suggestion -->
    <div class="suggestion-panel" id="suggestion-panel">
      <div class="suggestion-label">Ghost Suggestion</div>
      <div class="suggestion-text" id="suggestion-text">
        <div class="empty-state">Press Ctrl+Space to summon the Ghost</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-chip">
        <div class="stat-value" id="stat-words">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-chars">0</div>
        <div class="stat-label">Chars</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-sessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>

    <!-- Model badge -->
    <div class="model-badge">
      <div class="model-dot"></div>
      <span id="model-label">ollama · llama3 · local</span>
    </div>

    <!-- Action row -->
    <div class="action-row">
      <button class="btn-materialize" id="btn-materialize" onclick="materialize()">
        <span>✨</span>
        <span>Materialize</span>
      </button>
      <div class="btn-icon" title="Settings" onclick="openSettings()">⚙️</div>
      <div class="btn-icon" title="Hide" onclick="hideOverlay()">👁️</div>
    </div>

  </div>

  <script type="module">
    import { invoke } from 'https://unpkg.com/@tauri-apps/api@2/core';
    import { listen } from 'https://unpkg.com/@tauri-apps/api@2/event';

    let sessionCount = 0;
    let isThinking = false;

    // Listen for phantom events from Rust backend
    await listen('phantom:status', (event) => {
      setStatus(event.payload);
    });

    await listen('phantom:suggestion', (event) => {
      showSuggestion(event.payload);
    });

    await listen('phantom:hotkey', () => {
      materialize();
    });

    window.materialize = async function() {
      if (isThinking) return;
      isThinking = true;

      const btn = document.getElementById('btn-materialize');
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const suggestionPanel = document.getElementById('suggestion-panel');

      btn.disabled = true;
      btn.innerHTML = '<span>🔮</span><span>Thinking...</span>';
      dot.className = 'status-dot thinking';
      statusText.textContent = 'Reading your document...';
      suggestionPanel.classList.add('active');

      // Show loading shimmer
      document.getElementById('suggestion-text').innerHTML = `
        <div class="loading-shimmer" style="width:90%"></div>
        <div class="loading-shimmer" style="width:70%; margin-top:8px"></div>
        <div class="loading-shimmer" style="width:50%; margin-top:8px"></div>
      `;

      try {
        const result = await invoke('trigger_materialize');
        showSuggestion(result);
        sessionCount++;
        document.getElementById('stat-sessions').textContent = sessionCount;
      } catch (e) {
        const errStr = String(e);
        if (errStr.includes("is unavailable") || errStr.toLowerCase().includes("unavailable")) {
          showToast(errStr);
        }
        document.getElementById('suggestion-text').innerHTML =
          `<div style="color:#ef4444;font-size:12px">⚠️ ${e}</div>`;
        dot.className = 'status-dot error';
        statusText.textContent = 'Error — is Phantom Core running?';
      } finally {
        isThinking = false;
        btn.disabled = false;
        btn.innerHTML = '<span>✨</span><span>Materialize</span>';
      }
    };

    window.showToast = function(message) {
      const banner = document.getElementById('toast-banner');
      const msg = document.getElementById('toast-message');
      msg.textContent = message;
      banner.classList.add('show');
      setTimeout(() => {
        hideToast();
      }, 5000);
    };

    window.hideToast = function() {
      const banner = document.getElementById('toast-banner');
      banner.classList.remove('show');
    };

    function showSuggestion(text) {
      const el = document.getElementById('suggestion-text');
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      // Animate the suggestion text appearing
      el.innerHTML = '';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'ghost-cursor';

      const interval = setInterval(() => {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          el.appendChild(cursor);
          i++;
          // Update stats
          document.getElementById('stat-words').textContent =
            text.trim().split(/\s+/).filter(Boolean).length;
          document.getElementById('stat-chars').textContent = i;
        } else {
          clearInterval(interval);
          cursor.remove();
          dot.className = 'status-dot';
          statusText.textContent = 'Ghost typed · Ready';
        }
      }, 20);
    }

    function setStatus(status) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const map = {
        idle: ['idle', 'Idle'],
        capturing: ['thinking', 'Reading your document...'],
        thinking: ['thinking', 'Asking AI...'],
        typing: ['thinking', 'Ghost typing...'],
        error: ['error', 'Error occurred'],
      };
      const [cls, label] = map[status] || ['', status];
      dot.className = `status-dot ${cls}`;
      text.textContent = label;
    }

    window.hideOverlay = function() {
      invoke('toggle_visibility');
    };

    window.openSettings = function() {
      // TODO: open settings panel
    };

    // Load config
    invoke('get_config').then(cfg => {
      document.getElementById('model-label').textContent =
        `${cfg.provider} · ${cfg.model} · ${cfg.provider === 'ollama' ? 'local' : 'cloud'}`;
    });
  </script>
</body>
</html>
