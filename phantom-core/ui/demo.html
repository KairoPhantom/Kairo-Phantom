<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document1 — Kairo Phantom Demo</title>
    <style>
        body {
            background-color: #f3f4f6; /* Outer grey area like MS Word background */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 40px;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .document-container {
            width: 800px;
            height: 90vh;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 80px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 36px;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #4b5563;
            border-bottom: 1px solid #d1d5db;
            font-weight: 500;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        .text-area {
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 1.6;
            color: #000;
            white-space: pre-wrap;
            flex: 1;
            outline: none;
            margin-top: 20px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: black;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        .confidence-band {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 40, 20, 0.8);
            color: #4ade80;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="document-container">
        <div class="top-bar">Document1 — Kairo Phantom Demo</div>
        <div class="text-area" id="editor"><span class="cursor" id="cursor"></span></div>
    </div>
    <div class="confidence-band" id="confidence-band">● Kairo is confident</div>

    <script>
        const editor = document.getElementById('editor');
        const band = document.getElementById('confidence-band');
        let content = "";
        
        window.typeCharacter = function(char) {
            if (char === '\n') {
                content += '<br>';
            } else {
                content += char;
            }
            editor.innerHTML = content + '<span class="cursor" id="cursor"></span>';
        };

        window.showConfidenceBand = function() {
            band.style.opacity = '1';
            setTimeout(() => {
                band.style.opacity = '0';
            }, 1500);
        };
    </script>
</body>
</html>
