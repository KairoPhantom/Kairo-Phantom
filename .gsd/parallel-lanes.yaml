# GSD Parallel Test Orchestration Plan
# Generated: 2026-05-10
# Strategy: Run 3 independent test lanes in parallel
# Lanes are isolated and can execute concurrently without conflicts

lanes:
  - id: "rust-core-tests"
    name: "Rust Core Integration Tests"
    agent: "gsd-rust-tester"
    commands:
      - cargo test --manifest-path phantom-core/Cargo.toml --test layer4_e2e_tests --release
    timeout_sec: 600
    description: |
      Compiles and executes the Rust integration test suite for agent routing,
      app detection, and core orchestration logic. No desktop required.
      Tests verify PowerPoint, Code, Excel, Word agent selection.
    prerequisites:
      - Rust toolchain installed
      - Cargo in PATH

  - id: "word-e2e-test"
    name: "Microsoft Word E2E Test (T1)"
    agent: "gsd-word-tester"
    commands:
      - python scripts/setup_fixtures.py
      - python tests/scripts/win/t1_word.py
    timeout_sec: 180
    description: |
      Sets up test fixtures (C:\tests\report.docx) and executes the Word
      end-to-end scenario: opens Word, triggers Alt+M, verifies ghost-write
      injection and undo functionality.
    prerequisites:
      - Windows 11
      - Microsoft Word installed
      - Python 3.11+ with pywinauto, keyboard
      - Kairo Phantom engine running in background
    skip_if_missing: true

  - id: "browser-e2e-test"
    name: "Browser Yjs Collaborative Test (T4)"
    agent: "gsd-browser-tester"
    commands:
      - node tests/scripts/browser/t4_yjs_google_docs.js
    timeout_sec: 120
    description: |
      Executes the browser-based scenario using Playwright: launches Chrome,
      simulates a contenteditable document, triggers Alt+M, and verifies
      text injection via DOM inspection.
    prerequisites:
      - Node.js with Playwright installed
      - Chrome/Chromium binary available
      - Kairo Phantom engine running in background
    skip_if_missing: true

# Aggregation strategy
aggregation:
  type: "json-merge"
  output_dir: "C:\\tests\\results"
  generate_master_report: true
  metrics:
    - test_count
    - pass_count
    - fail_count
    - total_duration_sec

# Execution strategy
execution:
  parallelism: 3
  fail_fast: false
  retry_on_fail: 1
  log_level: "info"

# Expected outcomes
expected:
  - lane: "rust-core-tests"
    pass_rate: "100%"
    reason: "Core routing logic is stable"
  
  - lane: "word-e2e-test"
    pass_rate: "90%"
    reason: "Word hotkey injection depends on environment and running Kairo engine"
  
  - lane: "browser-e2e-test"
    pass_rate: "95%"
    reason: "Browser test is isolated and repeatable"
