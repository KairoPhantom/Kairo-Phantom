apiVersion: gsd.kairo/v1
kind: ParallelTestOrchestration
metadata:
  name: kairo-39-scenario-full-parallel
  version: "1.0.0"
  description: "Orchestrate 8 GSD/Ruflo agents in parallel to test all 39 scenarios from test-realworld.md"
  timestamp: "2026-05-10"

spec:
  totalScenarios: 39
  parallelAgents: 8
  chaosAgent: true
  
  # Background chaos agent - starts first and runs throughout all tests
  chaosAgent:
    name: agent_chaos
    type: background
    priority: 100
    command: |
      powershell -File scripts/win/chaos_advanced.ps1 -Duration 0 -ContinuousMode
    logFile: "C:\\tests\\logs\\chaos-background.log"
    description: "Continuous fault injection: network disruption, clipboard wipe, CPU spike, Firewall block, disk saturation"
    startDelay: 0
    killSignal: SIGTERM

  # Primary parallel agents
  parallelAgents:
    
    # Agent 1: Word (10 scenarios)
    - name: agent_word
      type: primary
      priority: 50
      application: "Microsoft Word"
      scenarios: [W1, W2, W3, W4, W5, W6, W7, W8, W9, W10]
      command: |
        python scripts/win/orchestrator_word.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_word \
          --scenarios W1,W2,W3,W4,W5,W6,W7,W8,W9,W10 \
          --log-file C:\\tests\\logs\\agent_word.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 600
      logFile: "C:\\tests\\logs\\agent_word.log"
      expectedScenarios: 10
      
    # Agent 2: PowerPoint (7 scenarios)
    - name: agent_ppt
      type: primary
      priority: 50
      application: "Microsoft PowerPoint"
      scenarios: [P1, P2, P3, P4, P5, P6, P7]
      command: |
        python scripts/win/orchestrator_ppt.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_ppt \
          --scenarios P1,P2,P3,P4,P5,P6,P7 \
          --log-file C:\\tests\\logs\\agent_ppt.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 480
      logFile: "C:\\tests\\logs\\agent_ppt.log"
      expectedScenarios: 7
      
    # Agent 3: Excel (5 scenarios)
    - name: agent_excel
      type: primary
      priority: 50
      application: "Microsoft Excel"
      scenarios: [E1, E2, E3, E4, E5]
      command: |
        python scripts/win/orchestrator_excel.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_excel \
          --scenarios E1,E2,E3,E4,E5 \
          --log-file C:\\tests\\logs\\agent_excel.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 420
      logFile: "C:\\tests\\logs\\agent_excel.log"
      expectedScenarios: 5
      
    # Agent 4: VS Code (6 scenarios)
    - name: agent_vscode
      type: primary
      priority: 50
      application: "Visual Studio Code"
      scenarios: [V1, V2, V3, V4, V5, V6]
      command: |
        python scripts/win/orchestrator_vscode.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_vscode \
          --scenarios V1,V2,V3,V4,V5,V6 \
          --log-file C:\\tests\\logs\\agent_vscode.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 420
      logFile: "C:\\tests\\logs\\agent_vscode.log"
      expectedScenarios: 6
      
    # Agent 5: Browser/Google Docs (4 scenarios)
    - name: agent_browser
      type: primary
      priority: 50
      application: "Chrome + Google Docs + Yjs Collaboration"
      scenarios: [G1, G2, G3, G4]
      command: |
        node scripts/browser/orchestrator_browser.js \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_browser \
          --scenarios G1,G2,G3,G4 \
          --log-file C:\\tests\\logs\\agent_browser.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 360
      logFile: "C:\\tests\\logs\\agent_browser.log"
      expectedScenarios: 4
      
    # Agent 6: Notepad (3 scenarios)
    - name: agent_notepad
      type: primary
      priority: 50
      application: "Windows Notepad"
      scenarios: [N1, N2, N3]
      command: |
        python scripts/win/orchestrator_notepad.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_notepad \
          --scenarios N1,N2,N3 \
          --log-file C:\\tests\\logs\\agent_notepad.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 240
      logFile: "C:\\tests\\logs\\agent_notepad.log"
      expectedScenarios: 3
      
    # Agent 7: Terminal/PowerShell (4 scenarios)
    - name: agent_terminal
      type: primary
      priority: 50
      application: "Windows Terminal + PowerShell"
      scenarios: [T1, T2, T3, T4]
      command: |
        python scripts/win/orchestrator_terminal.py \
          --manifest test_manifest_39scenarios.json \
          --agent-id agent_terminal \
          --scenarios T1,T2,T3,T4 \
          --log-file C:\\tests\\logs\\agent_terminal.log \
          --gate-enforce \
          --max-retries 3 \
          --screenshot-on-fail
      timeout: 300
      logFile: "C:\\tests\\logs\\agent_terminal.log"
      expectedScenarios: 4

  # Execution control
  execution:
    mode: parallel
    maxConcurrentAgents: 8
    chaosAgentStartsFirst: true
    agentStartDelayMs: 500
    pollInterval: 5
    healthCheck: true
    healthCheckInterval: 30
    
  # Result aggregation
  aggregation:
    outputFormat: json
    masterReportFile: "C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json"
    summaryFile: "C:\\tests\\results\\SUMMARY.md"
    combineLogFiles: true
    combinedLogFile: "C:\\tests\\logs\\COMBINED_ALL_AGENTS.log"
    
  # Success criteria
  successCriteria:
    minPassRate: 0.95  # 95% of scenarios must pass
    allChaosScenariosMustPass: false  # Chaos tests lower bar
    zeroFatalErrors: true
    
  # Notifications
  notifications:
    onStart: true
    onComplete: true
    onAgentFailure: true
    onScenarioPass: false  # Too verbose if per-scenario
    slackWebhook: null

---

# GSD PHASE PLAN FOR 39-SCENARIO EXECUTION

kind: GSDPhase
metadata:
  name: "39-scenario-parallel-execution"
  phase: "EXECUTE"

plan:
  title: "Deploy 8 GSD/Ruflo Agents to Test All 39 Kairo Phantom Scenarios in Parallel"
  goal: "Execute all 39 test scenarios (W1-W10, P1-P7, E1-E5, V1-V6, G1-G4, N1-N3, T1-T4) simultaneously with 8 parallel agents, while AGENT_CHAOS introduces real faults. Achieve 95%+ pass rate despite chaos conditions."
  
  prerequisites:
    - Kairo Phantom daemon running: "kairo --json-logs"
    - Ollama with qwen2.5-coder:14b: "ollama run qwen2.5-coder:14b"
    - Test fixtures: "C:\\tests\\report.docx, deck.pptx, spreadsheet.xlsx, notes.txt"
    - Python packages: "pywinauto, keyboard, pyautogui, python-docx, openpyxl"
    - Node.js packages: "playwright, agent-browser"
    - Network connectivity for G1-G4 (Google Docs), or mock with local Yjs
    - Windows 11 with Word, PowerPoint, Excel, VS Code, Chrome, Terminal, Notepad
    
  phases:
    
    Phase_1_Setup:
      name: "Prepare Infrastructure"
      duration: "~5 minutes"
      tasks:
        - task: "Create log and screenshot directories"
          command: "mkdir -p C:\\tests\\logs C:\\tests\\screenshots C:\\tests\\results"
          
        - task: "Start Kairo Phantom daemon"
          command: "start kairo --json-logs"
          waitForHealthCheck: true
          
        - task: "Start Ollama"
          command: "ollama serve"
          isBackground: true
          
        - task: "Run chaos agent setup"
          command: "python scripts/win/setup_chaos.py"
          
    Phase_2_Chaos_Start:
      name: "Launch Background Chaos Agent"
      duration: "~10 seconds"
      tasks:
        - task: "Start AGENT_CHAOS"
          command: "gsd run --agent agent_chaos --command \"powershell -File scripts/win/chaos_advanced.ps1 -Duration 0 -ContinuousMode\""
          isBackground: true
          priority: "high"
          
    Phase_3_Deploy_Parallel_Agents:
      name: "Launch All 8 Parallel Test Agents"
      duration: "~10 minutes (agents run concurrently)"
      parallelization: "8-way parallel"
      tasks:
        - task: "Deploy AGENT_WORD (10 scenarios)"
          command: "gsd run --agent agent_word --command \"python scripts/win/orchestrator_word.py ...\""
          
        - task: "Deploy AGENT_PPT (7 scenarios)"
          command: "gsd run --agent agent_ppt --command \"python scripts/win/orchestrator_ppt.py ...\""
          
        - task: "Deploy AGENT_EXCEL (5 scenarios)"
          command: "gsd run --agent agent_excel --command \"python scripts/win/orchestrator_excel.py ...\""
          
        - task: "Deploy AGENT_VSCODE (6 scenarios)"
          command: "gsd run --agent agent_vscode --command \"python scripts/win/orchestrator_vscode.py ...\""
          
        - task: "Deploy AGENT_BROWSER (4 scenarios)"
          command: "gsd run --agent agent_browser --command \"node scripts/browser/orchestrator_browser.js ...\""
          
        - task: "Deploy AGENT_NOTEPAD (3 scenarios)"
          command: "gsd run --agent agent_notepad --command \"python scripts/win/orchestrator_notepad.py ...\""
          
        - task: "Deploy AGENT_TERMINAL (4 scenarios)"
          command: "gsd run --agent agent_terminal --command \"python scripts/win/orchestrator_terminal.py ...\""
      
      allParallel: true
      
    Phase_4_Monitor_Execution:
      name: "Monitor All Agents and Chaos"
      duration: "~10 minutes (while agents execute)"
      tasks:
        - task: "Poll agent health every 5 seconds"
          command: "python scripts/monitor_agents.py --poll-interval 5"
          
        - task: "Watch combined logs in real-time"
          command: "tail -f C:\\tests\\logs\\COMBINED_ALL_AGENTS.log"
          
        - task: "Capture agent exit codes as they complete"
          command: "Tracked automatically by GSD"
          
    Phase_5_Chaos_Verification:
      name: "Confirm Chaos Agent Introduced Real Faults"
      duration: "~2 minutes"
      tasks:
        - task: "Verify chaos log shows fault injection"
          command: "Select-String 'Network disabled|CPU spike|Clipboard cleared|Firewall block|Disk saturation' C:\\tests\\logs\\chaos-background.log | Measure-Object -Line"
          expectedMinimumLines: 10
          
        - task: "Confirm all agents passed DESPITE chaos"
          command: "Verify no correlation between chaos events and agent failures"
          
    Phase_6_Aggregate_Results:
      name: "Collect and Summarize 39 Scenario Results"
      duration: "~3 minutes"
      tasks:
        - task: "Merge all agent logs"
          command: "python scripts/aggregate_results.py --manifest test_manifest_39scenarios.json --log-dir C:\\tests\\logs --output C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json"
          
        - task: "Generate markdown summary"
          command: "python scripts/generate_summary.py --report C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json --output C:\\tests\\results\\SUMMARY.md"
          
        - task: "Print pass/fail statistics"
          command: "python scripts/print_stats.py --report C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json"
          
    Phase_7_Report_Generation:
      name: "Create Final Report"
      duration: "~2 minutes"
      tasks:
        - task: "Generate HTML report for visualization"
          command: "python scripts/generate_html_report.py --report C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json --output C:\\tests\\results\\REPORT.html"
          
        - task: "Create summary of failures (if any)"
          command: "python scripts/extract_failures.py --report C:\\tests\\results\\MASTER_REPORT_39_SCENARIOS.json --output C:\\tests\\results\\FAILURES.md"
          
  success_criteria:
    - "All 39 scenarios completed execution"
    - "At least 95% (37+/39) scenarios passed"
    - "Chaos agent confirmed introducing real faults"
    - "All agents completed without fatal errors"
    - "Master report generated successfully"
    - "Zero data corruption in test documents"
    
  failure_handling:
    - "Any agent exits with non-zero: Mark scenario failed, retry up to 3 times"
    - "Any scenario fails 3 times: Escalate to human review, capture screenshot"
    - "Chaos agent dies: Restart immediately"
    - "Kairo daemon dies: Restart, re-run failed scenarios"
    
  rollback:
    - "Stop all agents: gsd stop --all"
    - "Stop chaos: Ctrl+C on chaos_advanced.ps1"
    - "Kill hanging applications: taskkill /F /IM winword.exe /IM powerpnt.exe /IM excel.exe"
    - "Clear test artifacts: rmdir /s /q C:\\tests"
    - "Restart Kairo daemon"

