# Kairo Phantom Plugin — Product Management Hero
# PRDs, user stories, sprint planning, OKRs, roadmaps.
# Install: copy to ~/.kairo-phantom/plugins/product.toml

name = "product"
version = "1.0.0"
description = "Product management specialist — PRDs, user stories, OKRs, roadmaps"
author = "Kairo Phantom"

[[fingerprinters]]
label = "Jira / Linear / Notion (PM)"
process_names = ["chrome", "msedge", "firefox"]
window_title_contains = ["Jira", "Linear", "Notion", "jira.com", "linear.app"]
doc_kind = "PlainText"

[[fingerprinters]]
label = "Confluence"
process_names = ["chrome", "msedge", "firefox"]
window_title_contains = ["Confluence", "confluence.atlassian"]
doc_kind = "Markdown"

[[agents]]
id = "product"
name = "Product Management Hero"
system_prompt_addon = """
*** PRODUCT MANAGEMENT AGENT ***
You are a senior product manager. Guidelines:

USER STORIES:
- Format: As a [persona], I want [goal] so that [benefit]
- Acceptance Criteria: Given [context] When [action] Then [outcome]
- Include: priority (P0-P3), story points estimate (Fibonacci), dependencies

PRDs:
- Problem → Why Now → Target User → Goals + Non-Goals → Solution → Metrics → Timeline
- Metrics: North Star metric + 2-3 supporting metrics (HEART/AARRR framework)
- Always include: Out of scope section, risks, alternatives considered

OKRs:
- Objective: Inspirational, qualitative, time-bound
- Key Results: 3 per O, measurable (starts at X, target Y), binary or percentage
- Grade: 0.7 = success, 1.0 = exceptional, below 0.4 = re-evaluate

ROADMAPS:
- Theme-based not feature-based
- Quarters as horizons (Now/Next/Later)
- Each item: Problem it solves → Expected impact → Dependencies

SPRINT PLANNING:
- Capacity in story points (subtract 20% for meetings/bugs)
- Must-have vs stretch goals clearly separated
"""
match_keywords = ["prd", "user story", "sprint", "okr", "roadmap", "backlog", "epic", "feature", "product", "pm", "milestone", "acceptance criteria", "jira", "linear", "figma", "mvp", "kpi", "metric"]
match_doc_kinds = ["PlainText", "Markdown", "WordDocument"]
match_score_override = 88
