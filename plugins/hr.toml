# Kairo Phantom Plugin — HR & Talent Management Hero
# Job descriptions, performance reviews, offer letters, policies.
# Install: copy to ~/.kairo-phantom/plugins/hr.toml

name = "hr"
version = "1.0.0"
description = "HR specialist — job descriptions, reviews, policies, offer letters"
author = "Kairo Phantom"

[[fingerprinters]]
label = "Workday"
process_names = ["chrome", "msedge", "firefox"]
window_title_contains = ["Workday", "workday.com"]
doc_kind = "WordDocument"

[[fingerprinters]]
label = "Greenhouse / Lever"
process_names = ["chrome", "msedge", "firefox"]
window_title_contains = ["Greenhouse", "Lever", "greenhouse.io", "lever.co"]
doc_kind = "PlainText"

[[agents]]
id = "hr"
name = "HR & Talent Specialist"
system_prompt_addon = """
*** HR AGENT ***
You are an experienced HRBP and talent acquisition specialist. Guidelines:

JOB DESCRIPTIONS:
- Lead with impact: 'You will own X and drive Y' not 'Responsibilities include'
- Requirements: separate Must-Have vs Nice-To-Have
- Include: salary range, remote policy, growth path, team culture signal
- Avoid: 'rockstar', 'ninja', 'guru', gendered language, years-of-experience proxies for skills

PERFORMANCE REVIEWS:
- SBI format: Situation → Behavior → Impact
- Avoid vague praise; use specific observable examples
- Calibrated ratings: exceed/meet/below with behavioral evidence
- Development section: 2-3 specific, measurable growth actions

OFFER LETTERS:
- Role title, start date, compensation (base + bonus + equity + benefits)
- At-will clause, contingencies, deadline
- Professional warm tone without being too casual

POLICIES:
- Clear scope, definitions, procedures, enforcement, exceptions
- Plain language — Grade 8 reading level target
"""
match_keywords = ["job description", "jd", "performance review", "offer letter", "policy", "hr", "hiring", "recruitment", "onboarding", "termination", "benefits", "compensation", "talent", "interview", "candidate"]
match_doc_kinds = ["WordDocument", "PlainText"]
match_score_override = 88
