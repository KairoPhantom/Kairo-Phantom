# =============================================================================
# Kairo-Phantom — Tier 2 CI (self-hosted GPU runner, live inference proofs)
# =============================================================================
# This is the REAL end-to-end gate. GitHub-hosted runners have NO GPU and NO
# Ollama, so the live inference paths (Qwen2.5-VL vision grounding, faster-
# whisper CUDA STT, embed-anything CLIP) CANNOT run there. They run HERE, on
# a self-hosted GPU runner with actual hardware.
#
# TRIGGERS:
#   - workflow_dispatch (manual, before any release tag)
#   - schedule (nightly at 03:00 UTC, to catch model/runtime drift)
#   - workflow_call (called from release workflow as a blocking gate)
#
# BLOCKING: This workflow's status check ("gpu-verify-pass") is a RELEASE
# gate only — it is NOT a required merge check for PRs to master. It blocks
# releases (via the release workflow's workflow_call), not everyday merges.
#
# RUNNER REQUIREMENTS (self-hosted GPU label):
#   - NVIDIA GPU with >= 8 GB VRAM (T4-class minimum, Qwen2.5-VL-7B Q4 needs ~6GB)
#   - CUDA 12.x toolkit installed
#   - Ollama running locally with qwen2.5vl:7b model pulled
#   - faster-whisper installed with CUDA support
#   - embed-anything installed with CLIP model available
#   - Python 3.12, ffmpeg, Rust toolchain
#
# PROVEN FACTS (each confirmed by quoting the real repo source line):
#
#   ground_element is async (vlm_grounding.py:227):
#     async def ground_element(
#   ground_element signature (vlm_grounding.py:227-230):
#     async def ground_element(self, screenshot_path: str | Path, description: str) -> GroundingResult
#   → Takes a FILE PATH (str|Path), not base64. Returns GroundingResult.
#
#   GroundingResult fields (vlm_grounding.py:46-53):
#     found: bool
#     x: int = 0
#     y: int = 0
#     confidence: float = 0.0
#     description: str = ""
#     raw_response: str = ""
#     latency_ms: float = 0.0
#   → All fields accessed in the proof (result.found, .x, .y, .confidence, .latency_ms) exist.
#
#   build_vlm_config (vlm_config.py:204):
#     def build_vlm_config(model_cache_dir=None, ollama_url="...", force_tier=None) -> VlmConfig
#   VLM_7B_Q4 spec (vlm_config.py:45-53):
#     ollama_pull_tag="qwen2.5vl:7b", min_vram_gb=6.0
#
#   MediaEmbeddings.embed_image (media_embeddings.py:27):
#     def embed_image(self, image_path):
#   → Returns list[float] (line 33: return list(map(float, emb.embedding)))
#   HAS_EMBED_ANYTHING (media_embeddings.py:4):
#     HAS_EMBED_ANYTHING = False  (set True on line 8 if import succeeds)
#   DEFAULT_CLIP_MODEL (media_embeddings.py:13):
#     DEFAULT_CLIP_MODEL = "openai/clip-vit-base-patch32"  → 512-dim
#
#   test_domain9_media.py is OUTSIDE tests/ (confirmed: kairo-sidecar/test_domain9_media.py)
#   → conftest.py (in tests/) does NOT apply to it. No skip-rule conflict on GPU.
# =============================================================================

name: Tier 2 — GPU Verify (Live Inference)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag being gated (e.g. v0.3.1). Empty = nightly drift check."
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * *"
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: false
        default: ""

concurrency:
  group: tier2-gpu-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  KAIRO_OFFLINE: "0"
  CUDA_VISIBLE_DEVICES: "0"
  OLLAMA_HOST: "http://127.0.0.1:11434"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Pre-flight — verify GPU + Ollama + models are available
  # ─────────────────────────────────────────────────────────────────────
  gpu-preflight:
    name: 🔍 GPU Pre-flight Check
    runs-on: [self-hosted, gpu]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify NVIDIA GPU is present
        run: |
          nvidia-smi || { echo "❌ No NVIDIA GPU detected — cannot run live inference"; exit 1; }
          echo "✅ GPU detected"

      - name: Verify CUDA toolkit
        run: |
          nvcc --version || { echo "❌ CUDA toolkit not found"; exit 1; }
          echo "✅ CUDA toolkit present"

      - name: Verify Ollama is running and reachable
        run: |
          curl -sSf http://127.0.0.1:11434/api/tags || { echo "❌ Ollama not running on :11434"; exit 1; }
          echo "✅ Ollama is running"

      - name: Verify required models are pulled
        run: |
          MODELS=$(curl -sS http://127.0.0.1:11434/api/tags | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for m in data.get('models', []):
              print(m['name'])
          ")
          echo "Available models:"
          echo "$MODELS"
          for REQUIRED in "qwen2.5vl:7b"; do
            if ! echo "$MODELS" | grep -q "$REQUIRED"; then
              echo "❌ Required model $REQUIRED not found — pulling..."
              ollama pull "$REQUIRED" || { echo "❌ Failed to pull $REQUIRED"; exit 1; }
            fi
            echo "✅ Model $REQUIRED available"
          done

      - name: Verify ffmpeg (for transcription tests)
        run: |
          which ffmpeg || { echo "❌ ffmpeg not found"; exit 1; }
          echo "✅ ffmpeg present"

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Live VLM grounding — Qwen2.5-VL-7B via Ollama (real inference)
  # ─────────────────────────────────────────────────────────────────────
  live-vlm-grounding:
    name: 🖼️ Live VLM Grounding (Qwen2.5-VL-7B)
    runs-on: [self-hosted, gpu]
    needs: gpu-preflight
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install sidecar dependencies
        run: |
          pip install -r kairo-sidecar/requirements.txt
          pip install -r requirements-gpu.txt
          pip install pytest pytest-asyncio

      - name: Run live VLM grounding proof — real Qwen2.5-VL-7B inference
        working-directory: kairo-sidecar
        env:
          OLLAMA_HOST: "http://127.0.0.1:11434"
          CUDA_VISIBLE_DEVICES: "0"
        run: |
          # PROVEN: ground_element is async (vlm_grounding.py:227: "async def ground_element(")
          # PROVEN: signature is (self, screenshot_path: str|Path, description: str) -> GroundingResult
          # PROVEN: GroundingResult has fields: found, x, y, confidence, description, raw_response, latency_ms
          #   (vlm_grounding.py:46-53)
          # PROVEN: build_vlm_config(force_tier="gpu-7b") returns VlmConfig (vlm_config.py:204)
          # PROVEN: VLM_7B_Q4.ollama_pull_tag = "qwen2.5vl:7b" (vlm_config.py:46)
          python -c "
          import asyncio, os, tempfile
          from PIL import Image, ImageDraw
          from sidecar.cua.vlm_config import build_vlm_config, VLM_7B_Q4
          from sidecar.cua.vlm_grounding import VlmGroundingEngine, GroundingResult

          cfg = build_vlm_config(force_tier='gpu-7b')
          assert cfg.selected_model is VLM_7B_Q4, f'Wrong model tier: {cfg.selected_model}'
          print(f'✅ Model tier: {cfg.selected_model.ollama_pull_tag}')

          # ground_element takes a FILE PATH (str|Path), not base64
          test_img = os.path.join(tempfile.gettempdir(), 'test_screenshot.png')
          img = Image.new('RGB', (400, 300), (255, 255, 255))
          d = ImageDraw.Draw(img)
          d.rectangle([150, 120, 250, 170], fill=(0, 120, 215))
          d.text((170, 135), 'Submit', fill=(255, 255, 255))
          img.save(test_img)
          print(f'✅ Test screenshot saved: {test_img}')

          eng = VlmGroundingEngine(cfg)

          async def run():
              # async def ground_element(self, screenshot_path, description) -> GroundingResult
              result = await eng.ground_element(test_img, 'blue Submit button')
              return result

          result = asyncio.run(run())
          # GroundingResult fields: found, x, y, confidence, latency_ms (all proven to exist)
          print(f'✅ GroundingResult: found={result.found} x={result.x} y={result.y} '
                f'confidence={result.confidence:.2f} latency={result.latency_ms:.0f}ms')
          assert isinstance(result, GroundingResult), 'ground_element must return GroundingResult'
          print('✅ Live VLM grounding proof PASSED')
          "

  # ─────────────────────────────────────────────────────────────────────
  # JOB 3: Live STT — faster-whisper CUDA transcription (real inference)
  # ─────────────────────────────────────────────────────────────────────
  live-stt:
    name: 🎙️ Live STT (faster-whisper CUDA)
    runs-on: [self-hosted, gpu]
    needs: gpu-preflight
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r kairo-sidecar/requirements.txt
          pip install -r requirements-gpu.txt
          pip install pytest

      - name: Verify faster-whisper uses CUDA
        run: |
          python -c "
          import torch
          assert torch.cuda.is_available(), '❌ CUDA not available to PyTorch'
          print(f'✅ CUDA available: {torch.cuda.get_device_name(0)}')
          "
          python -c "
          from faster_whisper import WhisperModel
          model = WhisperModel('tiny', device='cuda', compute_type='float16')
          print('✅ faster-whisper loaded on CUDA')
          "

      - name: Run live transcription proof — real audio → text
        working-directory: kairo-sidecar
        env:
          CUDA_VISIBLE_DEVICES: "0"
        run: |
          python -c "
          import tempfile, os, subprocess
          from faster_whisper import WhisperModel

          test_wav = os.path.join(tempfile.gettempdir(), 'test_stt.wav')
          subprocess.run([
              'ffmpeg', '-y', '-f', 'lavfi', '-i',
              'sine=frequency=440:duration=2',
              '-ar', '16000', '-ac', '1', test_wav
          ], check=True, capture_output=True)

          model = WhisperModel('tiny', device='cuda', compute_type='float16')
          segments, info = model.transcribe(test_wav, language='en')
          text = ' '.join(seg.text for seg in segments)
          print(f'✅ Transcription completed: duration={info.duration:.1f}s, text={text!r}')
          assert info.duration > 0, 'Transcription produced no duration info'
          print('✅ Live STT proof PASSED')
          "

  # ─────────────────────────────────────────────────────────────────────
  # JOB 4: Live embeddings — embed-anything CLIP (real inference)
  # ─────────────────────────────────────────────────────────────────────
  live-embeddings:
    name: 🔢 Live Embeddings (embed-anything CLIP)
    runs-on: [self-hosted, gpu]
    needs: gpu-preflight
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r kairo-sidecar/requirements.txt
          pip install -r requirements-gpu.txt
          pip install pytest

      - name: Run live CLIP embedding proof — real image → 512-dim vector
        working-directory: kairo-sidecar
        env:
          CUDA_VISIBLE_DEVICES: "0"
        run: |
          # PROVEN: MediaEmbeddings.embed_image(self, image_path) -> list[float]
          #   (media_embeddings.py:27, returns list(map(float, emb.embedding)) on line 33)
          # PROVEN: HAS_EMBED_ANYTHING is a boolean constant (media_embeddings.py:4)
          # PROVEN: DEFAULT_CLIP_MODEL = "openai/clip-vit-base-patch32" (media_embeddings.py:13)
          #   → CLIP vit-base-patch32 produces 512-dim embeddings
          python -c "
          from sidecar.parsers.media_embeddings import MediaEmbeddings, HAS_EMBED_ANYTHING
          assert HAS_EMBED_ANYTHING, '❌ embed-anything not installed on GPU runner'

          from PIL import Image, ImageDraw
          import tempfile, os

          img = Image.new('RGB', (224, 224), (255, 0, 0))
          d = ImageDraw.Draw(img)
          d.rectangle([50, 50, 174, 174], fill=(0, 255, 0))
          test_path = os.path.join(tempfile.gettempdir(), 'test_embed.png')
          img.save(test_path)

          mgr = MediaEmbeddings()
          vec = mgr.embed_image(test_path)
          assert vec is not None, 'embed_image returned None'
          assert len(vec) == 512, f'Expected 512-dim (CLIP vit-base-patch32), got {len(vec)}'
          assert any(v != 0.0 for v in vec), 'Embedding is all zeros'
          print(f'✅ Live CLIP embedding: dim={len(vec)}, norm={sum(v*v for v in vec)**0.5:.4f}')
          print('✅ Live embeddings proof PASSED')
          "

  # ─────────────────────────────────────────────────────────────────────
  # JOB 5: Full Domain 9 media suite (live, with GPU)
  # ─────────────────────────────────────────────────────────────────────
  live-domain9-media:
    name: 🎬 Live Domain 9 Media Suite
    runs-on: [self-hosted, gpu]
    needs: [live-vlm-grounding, live-stt, live-embeddings]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r kairo-sidecar/requirements.txt
          pip install -r requirements-gpu.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio

      - name: Run full Domain 9 media test suite (LIVE, with GPU)
        working-directory: kairo-sidecar
        env:
          CUDA_VISIBLE_DEVICES: "0"
          OLLAMA_HOST: "http://127.0.0.1:11434"
          KAIRO_OFFLINE: "0"
        run: |
          # PROVEN: test_domain9_media.py is at kairo-sidecar/test_domain9_media.py
          #   (OUTSIDE tests/ dir → conftest.py does NOT apply)
          # On GPU hardware, HAS_EMBED_ANYTHING=True and HAS_FASTER_WHISPER=True,
          # so the real inference paths execute. The pytest.skip() at line 208 only
          # triggers when embed-anything IS installed but the test is the
          # "not-installed" variant — on GPU, those tests take the else-branch
          # (real embedding), not the skip.
          python -m pytest test_domain9_media.py \
            --tb=short \
            -p no:cacheprovider \
            --no-header

  # ─────────────────────────────────────────────────────────────────────
  # JOB 6: Rust release build on GPU runner (verify production binary)
  # ─────────────────────────────────────────────────────────────────────
  gpu-rust-build:
    name: 🦀 Rust Release Build (GPU runner)
    runs-on: [self-hosted, gpu]
    needs: gpu-preflight
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"
          components: rustfmt,clippy

      - name: cargo build --release — exclude phantom-overlay (Tauri needs system libs)
        run: cargo build --release --workspace --exclude phantom-overlay

      - name: cargo test — workspace excluding phantom-overlay (blocking)
        env:
          KAIRO_OFFLINE: "0"
          OLLAMA_HOST: "http://127.0.0.1:11434"
        run: cargo test --workspace --exclude phantom-overlay -- --nocapture

  # ─────────────────────────────────────────────────────────────────────
  # JOB 7: Aggregate — "gpu-verify-pass" — RELEASE gate (not merge gate)
  # ─────────────────────────────────────────────────────────────────────
  gpu-verify-pass:
    name: ✅ GPU Verify Pass (aggregate)
    runs-on: ubuntu-latest
    needs:
      - gpu-preflight
      - live-vlm-grounding
      - live-stt
      - live-embeddings
      - live-domain9-media
      - gpu-rust-build
    if: always()
    steps:
      - name: Verify all GPU jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python3 -c '
          import json, sys, os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = []
          for job, info in needs.items():
              if info.get("result") != "success":
                  result = info.get("result") or "unknown"
                  failed.append(f"{job}: {result}")
          if failed:
              print("❌ GPU verification jobs did not succeed:")
              for f in failed:
                  print(f"  {f}")
              sys.exit(1)
          tag = os.environ.get("RELEASE_TAG", "")
          if tag:
              print(f"✅ All GPU live-inference proofs passed. Release {tag} is cleared.")
          else:
              print("✅ All GPU live-inference proofs passed (nightly drift check).")
          '