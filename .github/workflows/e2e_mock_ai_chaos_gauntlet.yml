name: Kairo Phantom - 76-Scenario Mock AI Chaos Gauntlet (CI Stub Mode)

# NOTE: This workflow runs in mock-ai mode (--mock-ai / KAIRO_CI_STUB_MODE).
# It does NOT certify actual production readiness.
# Experimental stub-mode gauntlet; manual until real GUI automation lands.
# Demoted from auto-trigger because Windows GUI/clipboard scenarios (PDF4, O4)
# fail on mock-AI word-count thresholds that cannot be honestly satisfied
# without either real GUI automation or tuning MockAiBackend (which would be
# fake green).  Run manually via workflow_dispatch to verify daemon wiring.
on:
  workflow_dispatch:
    inputs:
      agent_filter:
        description: 'Run specific agent only (e.g. agent_word). Leave blank for all.'
        required: false
        default: ''
      max_retries:
        description: 'Max retries per failing scenario'
        required: false
        default: '3'

permissions:
  contents: read
  checks: write

env:
  MANIFEST: roadmaptoshow/output/kairo_gauntlet_graph.json
  KAIRO_LOG_LEVEL: info
  # P4: Set at workflow level so all steps can see it (including Ollama install gate)
  KAIRO_CI_STUB_MODE: "1"
  # F1: Single source of truth for daemon URL
  KAIRO_DAEMON_URL: "http://127.0.0.1:7437"

jobs:
  # ===================================================================
  # GATE 1 - Rust unit + integration tests
  # ===================================================================
  rust_gate:
    name: "Gate 1 - Rust Tests"
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            phantom-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release
        working-directory: phantom-core

      - name: Run phantom-core test suite
        run: cargo test -p phantom-core --tests -- --nocapture
        working-directory: phantom-core
        env:
          RUST_LOG: warn

      - name: Run memory benchmark
        shell: pwsh
        working-directory: phantom-core
        run: |
          $output = cargo run --release --bin memory_benchmark 2>&1 | Out-String
          Write-Host $output
          if ($output -match "Final Average Composite Score.*?(\d+\.\d+)") {
            $score = [double]$Matches[1]
            Write-Host "Memory score: $score"
            if ($score -lt 0.95) {
              Write-Error "Memory benchmark score $score < 0.95 threshold"
              exit 1
            }
          }

      - name: Strict Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: phantom-core

  # ===================================================================
  # GATE 2 - Generate test fixtures (shared artifact)
  # ===================================================================
  setup_fixtures:
    name: "Gate 2 - Generate Test Fixtures"
    runs-on: windows-latest
    needs: rust_gate
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install python-docx openpyxl pyautogui pywinauto playwright requests pyscreeze Pillow

      - name: Generate all test fixtures
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/setup_fixtures.py

      - name: Upload fixtures as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-fixtures
          path: C:\tests\
          retention-days: 1

  # ===================================================================
  # GATE 3 - 12 parallel GUI agents (sharded matrix)
  # FIX: removed job-level `if` that referenced matrix context —
  #      use a shell-level filter inside the step instead.
  # ===================================================================
  gui_gauntlet:
    name: "Agent ${{ matrix.agent }}"
    runs-on: windows-latest
    needs: setup_fixtures
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        include:
          - agent: agent_word
            scenarios: "W1,W2,W3,W4,W5,W6,W7,W8,W9,W10"
            app: "Microsoft Word"
          - agent: agent_ppt
            scenarios: "P1,P2,P3,P4,P5,P6,P7"
            app: "Microsoft PowerPoint"
          - agent: agent_excel
            scenarios: "E1,E2,E3,E4,E5,E6,E7"
            app: "Microsoft Excel"
          - agent: agent_browser
            scenarios: "G1,G2,G3,G4,G5,G6"
            app: "Google Chrome"
          - agent: agent_vscode
            scenarios: "V1,V2,V3,V4,V5,V6"
            app: "Visual Studio Code"
          - agent: agent_terminal
            scenarios: "T1,T2,T3,T4,T5"
            app: "Windows Terminal"
          - agent: agent_notepad
            scenarios: "N1,N2,N3,N4"
            app: "Windows Notepad"
          - agent: agent_obsidian
            scenarios: "O1,O2,O3,O4,O5"
            app: "Obsidian"
          - agent: agent_notion
            scenarios: "NO1,NO2,NO3,NO4"
            app: "Notion"
          - agent: agent_figma
            scenarios: "F1,F2,F3,F4,F5"
            app: "Figma Desktop"
          - agent: agent_slack
            scenarios: "S1,S2,S3,S4,S5"
            app: "Slack Desktop"
          - agent: agent_pdf
            scenarios: "PDF1,PDF2,PDF3,PDF4,PDF5"
            app: "PDF Reader"

    steps:
      - uses: actions/checkout@v4

      # FIX: agent_filter check moved here — shell supports matrix context
      - name: Check agent filter
        id: filter
        shell: pwsh
        run: |
          $filter = "${{ github.event.inputs.agent_filter }}"
          $agent  = "${{ matrix.agent }}"
          if ($filter -eq "" -or $filter -eq $agent) {
            echo "SKIP=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "SKIP=true" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping $agent (filter: $filter)"
          }

      - name: Download test fixtures
        if: steps.filter.outputs.SKIP != 'true'
        uses: actions/download-artifact@v4
        with:
          name: test-fixtures
          path: C:\tests\

      - name: Set up Python
        if: steps.filter.outputs.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install automation dependencies
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        run: |
          pip install pywinauto pyautogui python-docx openpyxl playwright requests pyscreeze Pillow
          playwright install chromium

      - name: Install Rust
        if: steps.filter.outputs.SKIP != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.filter.outputs.SKIP != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            phantom-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Kairo Phantom release binary
        if: steps.filter.outputs.SKIP != 'true'
        run: cargo build --release
        working-directory: phantom-core

      - name: Verify built binary location
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        run: |
          Write-Host "Searching for kairo-phantom.exe..."
          Get-ChildItem -Path "target\release", "phantom-core\target\release" -Filter "kairo-phantom.exe" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "Found: $($_.FullName)" }

      - name: Start mock Ollama server
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        run: |
          Start-Process -FilePath "python" -ArgumentList "scripts/win/mock_ollama.py" -WindowStyle Hidden
          Start-Sleep -Seconds 2
          Write-Host "Mock Ollama started on port 11435"

      - name: Install Ollama (local inference, no model pull in CI)
        if: ${{ steps.filter.outputs.SKIP != 'true' && env.KAIRO_CI_STUB_MODE != '1' }}
        shell: pwsh
        continue-on-error: true
        timeout-minutes: 4
        run: |
          # Download installer with a strict 60-second timeout
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://ollama.ai/download/OllamaSetup.exe" `
            -OutFile "$env:TEMP\OllamaSetup.exe" -TimeoutSec 60
          Start-Process "$env:TEMP\OllamaSetup.exe" -ArgumentList "/S" -Wait
          Start-Process "ollama" -ArgumentList "serve" -WindowStyle Hidden
          Start-Sleep -Seconds 8
          # NO model pull in CI -- agents run in stub/mock mode without a local model.
          # Pull only on self-hosted runners where the model is pre-cached.
          Write-Host "Ollama installed (no model pulled -- CI stub mode)"

      - name: Start Kairo Phantom daemon
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        timeout-minutes: 2
        run: |
          # Workspace root target/ is where cargo places binaries for workspace members
          $candidates = @(
            "target\release\kairo-phantom.exe",
            "phantom-core\target\release\kairo-phantom.exe"
          )
          $exe = $null
          foreach ($p in $candidates) {
            if (Test-Path $p) { $exe = $p; break }
          }
          if ($exe) {
            Write-Host "Found Kairo Phantom binary at: $exe"
            $daemon = Start-Process -FilePath $exe `
              -ArgumentList "--daemon", "--mock-ai" `
              -PassThru -WindowStyle Hidden
            echo "KAIRO_PID=$($daemon.Id)" >> $env:GITHUB_ENV
            echo "KAIRO_DAEMON_URL=http://127.0.0.1:7437" >> $env:GITHUB_ENV
            # Readiness gate: poll /health until 200 (timeout 60s)
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:7437/health" -TimeoutSec 3 -ErrorAction Stop
                if ($resp.StatusCode -eq 200) {
                  $ready = $true
                  Write-Host "Kairo Phantom daemon is healthy (attempt $($i+1))"
                  break
                }
              } catch {
                Write-Host "Waiting for daemon... (attempt $($i+1)/30)"
              }
            }
            if (-not $ready) {
              Write-Error "Kairo Phantom daemon failed to become healthy within 60s — aborting"
              exit 1
            }
            Write-Host "Kairo Phantom started (PID $($daemon.Id))"
          } else {
            Write-Error "Kairo Phantom binary not found — cannot run gauntlet without daemon"
            exit 1
          }

      - name: Start chaos monkey
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        continue-on-error: true
        timeout-minutes: 1
        run: |
          if (Test-Path "scripts\win\chaos_advanced.ps1") {
            Start-Process powershell `
              -ArgumentList "-ExecutionPolicy Bypass -File scripts\win\chaos_advanced.ps1" `
              -WindowStyle Hidden
            Write-Host "Chaos monkey started"
          } else {
            Write-Warning "chaos_advanced.ps1 not found -- skipping chaos injection"
          }

      - name: Create log/result directories
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "C:\tests\logs"       | Out-Null
          New-Item -ItemType Directory -Force "C:\tests\screenshots" | Out-Null
          New-Item -ItemType Directory -Force "C:\tests\results"     | Out-Null

      - name: Execute agent scenarios
        if: steps.filter.outputs.SKIP != 'true'
        shell: pwsh
        timeout-minutes: 20
        env:
          KAIRO_TEST_APP: "${{ matrix.app }}"
          MAX_RETRIES: "${{ github.event.inputs.max_retries || '3' }}"
          KAIRO_CI_STUB_MODE: "1"
          PYTHONUTF8: "1"
        run: |
          python scripts/win/universal_orchestrator.py `
            --manifest "$env:MANIFEST" `
            --agent-id "${{ matrix.agent }}" `
            --scenarios "${{ matrix.scenarios }}" `
            --log-file "C:\tests\logs\${{ matrix.agent }}.log" `
            --max-retries "$env:MAX_RETRIES" `
            --gate-enforce `
            --screenshot-on-fail

      - name: Stop Kairo Phantom daemon
        if: always()
        shell: pwsh
        run: |
          if ($env:KAIRO_PID) {
            Stop-Process -Id $env:KAIRO_PID -Force -ErrorAction SilentlyContinue
          }

      - name: Upload agent results
        if: always() && steps.filter.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.agent }}
          path: |
            C:\tests\results\${{ matrix.agent }}_results.json
            C:\tests\logs\${{ matrix.agent }}.log
            C:\tests\screenshots\
          retention-days: 7

  # ===================================================================
  # FINAL - Aggregate all 12 results into master report
  # ===================================================================
  aggregate_report:
    name: "Final - Master Gauntlet Report"
    runs-on: windows-latest
    needs: gui_gauntlet
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all agent results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: C:\tests\results\
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aggregate into master report
        shell: pwsh
        run: python scripts/win/finalize_and_report.py

      - name: Print master report summary
        shell: pwsh
        run: |
          $report = Get-Content "C:\tests\results\MASTER_GAUNTLET_REPORT.json" | ConvertFrom-Json
          Write-Host "==========================================="
          Write-Host "KAIRO PHANTOM - 76-SCENARIO GAUNTLET RESULT"
          Write-Host "==========================================="
          Write-Host "Total Scenarios : $($report.total_scenarios)"
          Write-Host "Passed          : $($report.passed)"
          Write-Host "Failed          : $($report.failed)"
          Write-Host "First-Attempt % : $($report.first_attempt_pass_rate)"
          Write-Host "Prompt Leakage  : $($report.system_prompt_leakage_events)"
          Write-Host "PRODUCTION READY: $($report.production_ready)"
          Write-Host "==========================================="
          if (-not $report.production_ready) {
            Write-Error "GAUNTLET FAILED - Kairo Phantom is NOT production ready"
            exit 1
          }

      - name: Upload master report
        uses: actions/upload-artifact@v4
        with:
          name: MASTER_GAUNTLET_REPORT
          path: C:\tests\results\MASTER_GAUNTLET_REPORT.json
          retention-days: 30
