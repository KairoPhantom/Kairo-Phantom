name: "🧨 Kairo Phantom — Six-Layer Testing Gauntlet"

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 1 + UNIT: Fast feedback — lint, format, unit tests
  # Target: < 5 minutes. Runs on every push.
  # ─────────────────────────────────────────────────────────────────────────────
  layer1-lint-unit:
    name: "L1 · Lint & Unit Tests (${{ matrix.rust }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: "🔍 cargo fmt"
        run: cargo fmt --all -- --check
      - name: "🔎 cargo clippy"
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: "✅ cargo test (unit)"
        run: cargo test --workspace --lib -- --nocapture
      - name: "🔒 cargo audit"
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 2: Property-Based Tests
  # proptest with 2000 cases per property — catches invariant violations
  # ─────────────────────────────────────────────────────────────────────────────
  layer2-property:
    name: "L2 · Property Tests"
    needs: layer1-lint-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "⚗️  Run property tests (2000 cases each)"
        run: cargo test --test layer2_property_tests -- --nocapture
        env:
          PROPTEST_CASES: 2000

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 3: Chaos Engineering — all 7 chaos scenarios
  # ─────────────────────────────────────────────────────────────────────────────
  layer3-chaos:
    name: "L3 · Chaos Engineering (${{ matrix.os }})"
    needs: layer1-lint-unit
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "💥 Run chaos tests"
        run: cargo test --test layer3_chaos_tests -- --nocapture --test-threads=1

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 4: Cross-Platform E2E Integration
  # Full Alt+M workflow validation on all 3 platforms simultaneously
  # ─────────────────────────────────────────────────────────────────────────────
  layer4-e2e:
    name: "L4 · E2E Integration (${{ matrix.os }})"
    needs: layer1-lint-unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "🖥️  Run E2E tests"
        run: cargo test --test layer4_e2e_tests -- --nocapture

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 5: Deterministic Simulation — 1000+ seeds
  # FoundationDB-style: same seed = same execution = reproducible failures
  # ─────────────────────────────────────────────────────────────────────────────
  layer5-simulation:
    name: "L5 · Deterministic Simulation (1000 seeds)"
    needs: [layer2-property, layer3-chaos, layer4-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "🎲 Run simulation with 1000 seeds"
        run: cargo test --test layer5_sim_tests -- --nocapture

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 6: Fuzz Testing — overnight on main branch only
  # cargo-fuzz with libFuzzer: 3 targets × 10 hours each
  # ─────────────────────────────────────────────────────────────────────────────
  layer6-fuzz:
    name: "L6 · Fuzz Testing (${{ matrix.target }})"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: layer5-simulation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [uia_text_parser, mcp_json_parser, toml_plugin_loader]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: "🦠 Install cargo-fuzz"
        run: cargo install cargo-fuzz
      - name: "🔀 Fuzz ${{ matrix.target }}"
        run: |
          cd phantom-core
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=36000 \
            -max_len=1048576 \
            -artifact_prefix=fuzz/artifacts/${{ matrix.target }}/
        continue-on-error: false
      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: phantom-core/fuzz/artifacts/${{ matrix.target }}/

  # ─────────────────────────────────────────────────────────────────────────────
  # LAYER 6b: Production Telemetry Validation
  # Verify JSON structured logging works correctly
  # ─────────────────────────────────────────────────────────────────────────────
  telemetry-validation:
    name: "L6b · Telemetry Validation"
    needs: layer5-simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "📊 Validate JSON telemetry output"
        run: |
          # Build release binary
          cargo build --release --bin kairo-phantom
          # Run with JSON logging for 2 seconds, capture output
          KAIRO_JSON_LOGS=1 timeout 2s ./target/release/kairo-phantom --help 2>&1 | \
            python3 -c "
import sys, json
lines = [l.strip() for l in sys.stdin if l.strip()]
for line in lines:
    try:
        parsed = json.loads(line)
        print('✅ Valid JSON log:', parsed.get('message', ''))
    except:
        pass  # Non-JSON lines are fine (e.g. --help output)
print('Telemetry validation passed')
"

  # ─────────────────────────────────────────────────────────────────────────────
  # RELEASE GATE: All layers must pass before a release tag is built
  # ─────────────────────────────────────────────────────────────────────────────
  release-gate:
    name: "🚀 Release Gate"
    needs: [layer5-simulation, telemetry-validation]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Build release binary"
        run: cargo build --release --bin kairo-phantom
      - name: "🔐 Sign binary (Linux GPG)"
        if: runner.os == 'Linux'
        run: |
          echo "Binary SHA256:"
          sha256sum target/release/kairo-phantom
      - name: "📤 Upload release artifact"
        uses: actions/upload-artifact@v4
        with:
          name: kairo-phantom-${{ runner.os }}
          path: |
            target/release/kairo-phantom
            target/release/kairo-phantom.exe
