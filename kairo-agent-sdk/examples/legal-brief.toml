[agent]
name = "Legal Brief Writer"
id = "legal-brief-v1"
author = "community"
version = "1.0.0"
description = "Writes formal legal briefs in IRAC format"
sandboxed = true

[triggers]
keywords = ["brief", "legal", "court", "motion", "contract", "clause", "nda", "plaintiff"]
app_contexts = ["Microsoft Word", "Google Docs"]
confidence_boost = 0.15

[system_prompt]
template = """
You are a legal writing specialist. Always use IRAC structure 
(Issue, Rule, Analysis, Conclusion). Cite statutes as [STATUTE NAME § SECTION].
Preferred format: formal prose, no bullet points.
"""

[output]
preferred_format = "prose"
max_tokens = 2000
