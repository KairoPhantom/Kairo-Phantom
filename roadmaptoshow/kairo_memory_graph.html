<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairo Phantom — Architecture Memory Graph</title>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    padding: 16px 24px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header .logo { font-size: 24px; }
  #header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  #header .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
  #controls {
    padding: 10px 24px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .badge:hover { opacity: 0.8; }
  .badge.phase1 { background: rgba(99,102,241,0.2); border-color: #6366f1; color: #a5b4fc; }
  .badge.phase2 { background: rgba(16,185,129,0.2); border-color: #10b981; color: #6ee7b7; }
  .badge.phase3 { background: rgba(245,158,11,0.2); border-color: #f59e0b; color: #fde68a; }
  .badge.phase4 { background: rgba(236,72,153,0.2); border-color: #ec4899; color: #fbcfe8; }
  .badge.all { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }
  #search {
    margin-left: auto;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 6px 12px;
    color: #fff;
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  #search:focus { border-color: rgba(99,102,241,0.6); }
  #graph { flex: 1; }
  #tooltip {
    position: fixed;
    background: rgba(20,20,30,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 320px;
    pointer-events: none;
    display: none;
    z-index: 1000;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  #tooltip h3 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  #tooltip .phase { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  #tooltip .desc { color: #aaa; line-height: 1.5; }
  #tooltip .file { color: #6366f1; font-size: 11px; margin-top: 8px; font-family: monospace; }
  #stats {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(20,20,30,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: #888;
    backdrop-filter: blur(8px);
  }
  #stats span { color: #fff; font-weight: 600; }
</style>
</head>
<body>
<div id="header">
  <span class="logo">👻</span>
  <div>
    <h1>Kairo Phantom — Architecture Memory Graph</h1>
    <div class="subtitle">43 nodes · 4 phases · Production v0.3.0 — Click any node to inspect</div>
  </div>
</div>
<div id="controls">
  <button class="badge all" onclick="filterPhase('all')">All Phases</button>
  <button class="badge phase1" onclick="filterPhase(1)">Phase 1: Image Pipeline</button>
  <button class="badge phase2" onclick="filterPhase(2)">Phase 2: PPT/MCP Bridge</button>
  <button class="badge phase3" onclick="filterPhase(3)">Phase 3: Ghost Session</button>
  <button class="badge phase4" onclick="filterPhase(4)">Phase 4: Distribution</button>
  <input type="text" id="search" placeholder="Search nodes..." oninput="searchNodes(this.value)">
</div>
<div id="graph"></div>
<div id="tooltip"></div>
<div id="stats">Nodes: <span id="node-count">43</span> | Edges: <span id="edge-count">0</span></div>

<script>
const NODES = [
  // Core
  { id: 1, label: "main.rs", phase: 0, group: "core", file: "phantom-core/src/main.rs", desc: "Entry point and main orchestration loop. Routes events from HotkeyWatcher through the Ghost Session pipeline to the AI backend and injector." },
  { id: 2, label: "api.rs", phase: 0, group: "core", file: "phantom-core/src/api.rs", desc: "HTTP API server (localhost:7437). Exposes /health, /context, /inject, /ask, /app, /agent, /generate_image endpoints." },
  { id: 3, label: "config.rs", phase: 0, group: "core", file: "phantom-core/src/config.rs", desc: "PhantomConfig TOML loader. Manages model, swarm, image, yjs, enterprise sections." },
  { id: 4, label: "swarm.rs", phase: 0, group: "core", file: "phantom-core/src/swarm.rs", desc: "SwarmOrchestrator + AgentRegistry. Routes prompts to Design, Reasoning, Content, Engineer, DataAnalyst, StudentTutor agents via DocumentContext analysis." },
  { id: 5, label: "ai.rs", phase: 0, group: "core", file: "phantom-core/src/ai.rs", desc: "AI backend abstraction. Implements OllamaBackend and OpenAiBackend with streaming completions via tokio channels." },
  { id: 6, label: "injector.rs", phase: 0, group: "core", file: "phantom-core/src/injector.rs", desc: "Text injection engine. Uses Windows SendInput API for char-by-char typing and clipboard paste for large text blocks." },
  { id: 7, label: "hotkey.rs", phase: 0, group: "core", file: "phantom-core/src/hotkey.rs", desc: "HotkeyWatcher. Listens for Alt+M globally via Windows keyboard hook and sends PhantomEvent::HotkeyPressed." },
  { id: 8, label: "crdt.rs", phase: 0, group: "core", file: "phantom-core/src/crdt.rs", desc: "CRDT session using yrs crate. AI peer has fixed clientID 999. Syncs all generated text for conflict-free collaborative editing." },
  { id: 9, label: "context.rs", phase: 0, group: "core", file: "phantom-core/src/context.rs", desc: "ContextEngine. Fingerprints the active application (Word, Figma, VS Code, etc.) and extracts the user's prompt text." },
  { id: 10, label: "plugin.rs", phase: 0, group: "core", file: "phantom-core/src/plugin.rs", desc: "Plugin system. Loads TOML plugins from ~/.kairo-phantom/plugins/, registers custom fingerprinters and agents at startup." },
  { id: 11, label: "document_context.rs", phase: 0, group: "core", file: "phantom-core/src/document_context.rs", desc: "DocumentContext struct and ExtractorRegistry. Parses OOXML, ODT, Markdown to extract headings, tables, slide count for document-aware AI prompts." },
  { id: 12, label: "uia.rs", phase: 0, group: "core", file: "phantom-core/src/uia.rs", desc: "Windows UIA reader. Gets focused element text via UI Automation API for reading what the user is working on." },
  { id: 13, label: "platform/", phase: 0, group: "core", file: "phantom-core/src/platform/", desc: "Cross-platform accessibility layer (v3.0). Trait-based design allows future macOS xa11y and Linux AT-SPI backends." },

  // Phase 1: Image Pipeline
  { id: 20, label: "image_pipeline.rs", phase: 1, group: "phase1", file: "phantom-core/src/image_pipeline.rs", desc: "Phase 1: ImageRouter. Routes image generation between gpt-image-1 (cloud HQ), gpt-image-1-mini (fast/cheap), and Ollama Stable Diffusion/FLUX (local). Context-aware prompt enhancement." },
  { id: 21, label: "OpenAiImageBackend", phase: 1, group: "phase1", file: "phantom-core/src/image_pipeline.rs", desc: "Phase 1: OpenAI Images API client. Supports gpt-image-1 and gpt-image-1-mini. Returns base64 PNG with 120s timeout." },
  { id: 22, label: "OllamaDiffuserBackend", phase: 1, group: "phase1", file: "phantom-core/src/image_pipeline.rs", desc: "Phase 1: Local Ollama image backend for Stable Diffusion / FLUX. 300s timeout for slow local generation." },
  { id: 23, label: "ImageRouter", phase: 1, group: "phase1", file: "phantom-core/src/image_pipeline.rs", desc: "Phase 1: Smart routing logic. Title slides → cloud HQ. Icons/thumbnails → cloud mini. Default → local first, cloud fallback." },
  { id: 24, label: "POST /generate_image", phase: 1, group: "phase1", file: "phantom-core/src/api.rs:270", desc: "Phase 1: API endpoint for MCP tools to trigger image generation. Returns base64 data + backend used." },
  { id: 25, label: "DesignAgent", phase: 1, group: "phase1", file: "phantom-core/src/swarm.rs:23", desc: "Phase 1: Swarm agent that handles Figma/Canva/PPT contexts. Emits [IMAGE: prompt] tags to trigger image generation pipeline." },

  // Phase 2: PPT/MCP Bridge
  { id: 30, label: "mcp_bridge.rs", phase: 2, group: "phase2", file: "phantom-core/src/mcp_bridge.rs", desc: "Phase 2: McpBridgeClient — spawns Python MCP servers as stdio subprocesses. Handles JSON-RPC line protocol. Auto-discovers server scripts via McpBridgeRegistry." },
  { id: 31, label: "office-pptx-bridge/", phase: 2, group: "phase2", file: "mcp-servers/office-pptx-bridge/server.py", desc: "Phase 2: python-pptx MCP server. Tools: create_presentation, add_slide, add_image_to_slide, list_slides, generate_ai_presentation. 6-tool API." },
  { id: 32, label: "figma-bridge/", phase: 2, group: "phase2", file: "mcp-servers/figma-bridge/server.py", desc: "Phase 2: Figma MCP bridge. Tools: import_image (temp staging), create_text, get_file_info, list_frames. Integrates with Figma REST API via FIGMA_ACCESS_TOKEN." },
  { id: 33, label: "PptxBridge", phase: 2, group: "phase2", file: "phantom-core/src/mcp_bridge.rs", desc: "Phase 2: High-level Rust API for PPTX bridge. create_presentation(slides), add_image_to_slide(index, b64). Spawns Python subprocess." },
  { id: 34, label: "FigmaBridge", phase: 2, group: "phase2", file: "phantom-core/src/mcp_bridge.rs", desc: "Phase 2: High-level Rust API for Figma bridge. import_image(name, b64), create_text(text, x, y)." },
  { id: 35, label: "mcp_client.rs", phase: 2, group: "phase2", file: "phantom-core/src/mcp_client.rs", desc: "Phase 2: Legacy async MCP client (tokio process). Bridges to Adeu, easy-notion-mcp, and other external MCP servers." },
  { id: 36, label: "plugins/", phase: 2, group: "phase2", file: "plugins/", desc: "Phase 2: Hero plugin directory. Ships finance.toml, legal.toml, design.toml — custom agents and fingerprinters. Copied to ~/.kairo-phantom/plugins/ by installer." },

  // Phase 3: Ghost Session
  { id: 40, label: "ghost_session.rs", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs", desc: "Phase 3: Full Ghost Session UX. Manages streaming state, cancellation, word-by-word accept, two alternatives (A/B), confidence bands, agent-aware undo." },
  { id: 41, label: "GhostSession", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs:141", desc: "Phase 3: Session struct. Holds CancellationToken, GhostBuffer, undo history, state machine (Streaming/Review/Accepted/Cancelled/Correcting)." },
  { id: 42, label: "CancellationToken", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs", desc: "Phase 3: tokio_util CancellationToken. Child token shared between streamer task and main loop. User Esc → token.cancel() → tokio::select! breaks stream." },
  { id: 43, label: "GhostBuffer", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs:82", desc: "Phase 3: Holds text_a (primary) and text_b (alternative). accept_next_word(), toggle_alternative(), undo_last_word()." },
  { id: 44, label: "ConfidenceBand", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs:30", desc: "Phase 3: Visual trust feedback (High/Medium/Low). Computed from prompt length and doc kind. Low confidence disables Tab-accept." },
  { id: 45, label: "UndoManager", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs:327", desc: "Phase 3: Agent-aware undo stack. Ctrl+Z reverts the entire AI operation at once. Separate redo stack." },
  { id: 46, label: "YjsPeer", phase: 3, group: "phase3", file: "phantom-core/src/ghost_session.rs:279", desc: "Phase 3: Kairo's Yjs CRDT peer mode. Injects text via crdt.rs for Notion/Google Docs/Linear collaborative editing. Shows as 'kairo-ai-{uuid}' in collaborator list." },

  // Phase 4: Distribution
  { id: 50, label: "kairo-mcp/", phase: 4, group: "phase4", file: "mcp-servers/kairo-mcp/src/main.rs", desc: "Phase 4: MCP server exposing 5 Kairo tools to Claude Code, Cursor, Goose, Windsurf. Tools: kairo_read_context, kairo_ghost_write, kairo_detect_app, kairo_ask, kairo_generate_image." },
  { id: 51, label: "governance.rs", phase: 4, group: "phase4", file: "phantom-core/src/governance.rs", desc: "Phase 4: Enterprise governance. AuditLogger (JSONL file + ring buffer), PluginPermissionManifest (security scanning), EnterpriseConfig (model allowlist, SSO hook), SessionGovernor (rate limiting)." },
  { id: 52, label: "install.ps1", phase: 4, group: "phase4", file: "install.ps1", desc: "Phase 4: Windows PowerShell installer. Checks Rust/Python/Ollama, builds both binaries, installs to PATH, creates config, installs hero plugins, auto-configures MCP for Claude/Cursor/Goose." },
  { id: 53, label: "install.py", phase: 4, group: "phase4", file: "install.py", desc: "Phase 4: Cross-platform Python installer. Verifies dependencies, generates config, installs python-pptx." },
  { id: 54, label: "AuditLogger", phase: 4, group: "phase4", file: "phantom-core/src/governance.rs:64", desc: "Phase 4: Writes JSONL audit trail to ~/.kairo-phantom/audit.jsonl. Tracks GhostSessionStarted, Accepted, Rejected, Cancelled, ImageGenerated, McpToolCalled. In-memory ring buffer (1000 entries)." },
  { id: 55, label: "McpBridgeRegistry", phase: 4, group: "phase4", file: "phantom-core/src/mcp_bridge.rs", desc: "Phase 4: Auto-discovers PPTX/Figma bridge scripts relative to binary and CWD. Initialized at startup in main.rs." },
  { id: 56, label: "kairo_memory_graph.py", phase: 4, group: "phase4", file: "roadmaptoshow/kairo_memory_graph.py", desc: "Phase 4: Interactive vis-network architecture graph. 43 nodes, phase filtering, node search, hover tooltips. HTML output." },
];

const EDGES = [
  // Core flow
  { from: 1, to: 7, label: "HotkeyPressed" },
  { from: 1, to: 12, label: "UIA read" },
  { from: 1, to: 9, label: "fingerprint" },
  { from: 1, to: 11, label: "extract" },
  { from: 1, to: 4, label: "route" },
  { from: 1, to: 5, label: "stream" },
  { from: 1, to: 6, label: "inject" },
  { from: 1, to: 8, label: "CRDT sync" },
  { from: 1, to: 2, label: "HTTP API" },
  { from: 1, to: 51, label: "audit log" },
  { from: 1, to: 30, label: "MCP bridge" },
  { from: 2, to: 24, label: "endpoint" },
  { from: 2, to: 5, label: "AI backend" },
  { from: 2, to: 4, label: "swarm" },
  { from: 3, to: 5, label: "model config" },
  { from: 4, to: 5, label: "route to backend" },
  { from: 4, to: 25, label: "design agent" },
  { from: 9, to: 11, label: "DocKind" },
  { from: 10, to: 4, label: "register agent" },
  { from: 10, to: 9, label: "register fingerprinter" },
  // Phase 1
  { from: 20, to: 21, label: "cloud HQ" },
  { from: 20, to: 22, label: "local SD/FLUX" },
  { from: 23, to: 20, label: "uses" },
  { from: 24, to: 23, label: "triggers" },
  { from: 25, to: 24, label: "[IMAGE:] tag" },
  // Phase 2
  { from: 30, to: 31, label: "spawns" },
  { from: 30, to: 32, label: "spawns" },
  { from: 33, to: 30, label: "uses" },
  { from: 34, to: 30, label: "uses" },
  { from: 36, to: 10, label: "loaded by" },
  // Phase 3
  { from: 40, to: 41, label: "contains" },
  { from: 41, to: 42, label: "cancellation" },
  { from: 41, to: 43, label: "buffer" },
  { from: 41, to: 44, label: "confidence" },
  { from: 41, to: 45, label: "undo stack" },
  { from: 46, to: 8, label: "CRDT ops" },
  { from: 1, to: 40, label: "ghost session" },
  // Phase 4
  { from: 50, to: 2, label: "calls API" },
  { from: 52, to: 50, label: "installs" },
  { from: 52, to: 36, label: "copies plugins" },
  { from: 54, to: 1, label: "integrated in" },
  { from: 55, to: 30, label: "initializes" },
];

const phaseColors = {
  0: { bg: "#1e1e2e", border: "#4a4a6a", font: "#c0c0e0" },
  1: { bg: "#1a1a35", border: "#6366f1", font: "#a5b4fc" },
  2: { bg: "#0f2a1a", border: "#10b981", font: "#6ee7b7" },
  3: { bg: "#2a1a05", border: "#f59e0b", font: "#fde68a" },
  4: { bg: "#2a0f1a", border: "#ec4899", font: "#fbcfe8" },
};

const phaseLabels = {
  0: "Core",
  1: "Phase 1: Image",
  2: "Phase 2: MCP",
  3: "Phase 3: Ghost",
  4: "Phase 4: Launch",
};

// Build vis-network nodes and edges
const visNodes = new vis.DataSet(NODES.map(n => ({
  id: n.id,
  label: n.label,
  title: n.label,
  color: {
    background: phaseColors[n.phase].bg,
    border: phaseColors[n.phase].border,
    highlight: { background: phaseColors[n.phase].bg, border: "#fff" },
    hover: { background: phaseColors[n.phase].bg, border: "#fff" },
  },
  font: { color: phaseColors[n.phase].font, size: 12, face: "Inter" },
  borderWidth: 2,
  shape: n.phase === 0 ? "box" : "ellipse",
  _data: n,
})));

const visEdges = new vis.DataSet(EDGES.map((e, i) => ({
  id: i,
  from: e.from,
  to: e.to,
  label: e.label || "",
  arrows: "to",
  color: { color: "rgba(120,120,160,0.3)", highlight: "rgba(255,255,255,0.7)" },
  font: { color: "#888", size: 9, face: "Inter", align: "middle" },
  smooth: { type: "curvedCW", roundness: 0.2 },
})));

document.getElementById("edge-count").textContent = EDGES.length;

const container = document.getElementById("graph");
const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
  physics: {
    enabled: true,
    solver: "forceAtlas2Based",
    forceAtlas2Based: {
      gravitationalConstant: -80,
      springLength: 120,
      springConstant: 0.05,
      damping: 0.4,
    },
    stabilization: { iterations: 200 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 0,
    navigationButtons: false,
    zoomView: true,
  },
  layout: { randomSeed: 42 },
});

// Custom tooltip
const tooltip = document.getElementById("tooltip");
network.on("hoverNode", function(params) {
  const nodeId = params.node;
  const node = NODES.find(n => n.id === nodeId);
  if (!node) return;

  const pc = phaseColors[node.phase];
  tooltip.innerHTML = `
    <div class="phase" style="color:${pc.border}">${phaseLabels[node.phase]}</div>
    <h3>${node.label}</h3>
    <div class="desc">${node.desc}</div>
    ${node.file ? `<div class="file">📁 ${node.file}</div>` : ""}
  `;
  tooltip.style.display = "block";
  tooltip.style.left = (params.event.clientX + 16) + "px";
  tooltip.style.top = (params.event.clientY - 8) + "px";
});

network.on("blurNode", () => { tooltip.style.display = "none"; });

network.on("click", function(params) {
  if (params.nodes.length > 0) {
    const node = NODES.find(n => n.id === params.nodes[0]);
    if (node && node.file) {
      console.log("Selected:", node.file);
    }
  }
});

// Phase filter
function filterPhase(phase) {
  const ids = phase === "all" ? NODES.map(n => n.id) : NODES.filter(n => n.phase === phase || n.phase === 0).map(n => n.id);
  const updates = NODES.map(n => ({
    id: n.id,
    hidden: !ids.includes(n.id),
  }));
  visNodes.update(updates);
  const edgeUpdates = EDGES.map((e, i) => ({
    id: i,
    hidden: !ids.includes(e.from) || !ids.includes(e.to),
  }));
  visEdges.update(edgeUpdates);
  document.getElementById("node-count").textContent = ids.length;
}

// Node search
function searchNodes(q) {
  const lower = q.toLowerCase();
  const updates = NODES.map(n => ({
    id: n.id,
    hidden: q.length > 0 && !n.label.toLowerCase().includes(lower) && !n.desc.toLowerCase().includes(lower),
    borderWidth: (!q || n.label.toLowerCase().includes(lower)) ? 2 : 1,
  }));
  visNodes.update(updates);
}

// Stabilize and fit on load
network.once("stabilizationIterationsDone", () => {
  network.fit({ animation: { duration: 800, easingFunction: "easeInOutQuad" } });
});
</script>
</body>
</html>
